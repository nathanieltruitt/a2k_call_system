# Part 3: etichette per le site settings (Admin > Site settings > Plugins)
en:
  a2k_meet:
    calling_you: "%{username} is calling you"
    calling_you_short: "is calling you"
    incoming_call_title: "Incoming call"
    missed_call_short: "Missed a call"
    missed_call_title: "Missed call"
    custom_ringtone_n: "Ringtone %{n}"
  site_settings:
    a2k_meet_enabled: "Enable A2K Meet (VoIP calls between users)"
    a2k_meet_allowed_groups: "Who can see and use A2K Meet (default: Administrators only; you can add Staff, Moderators, or trust level groups)"
    a2k_meet_require_follow: "Require the callee to follow the caller (when discourse-follow is enabled). If disabled, any allowed user can call any other allowed user."
    a2k_meet_incoming_sound: "Sound for incoming calls: Discourse (none/default/ding/bell/chat), custom (up to 10 MP3 ringtones below; user picks one in the widget with preview), or alternative (built-in). Ringtone plays for up to 48 seconds."
    a2k_meet_custom_ringtone_1: "Custom ringtone 1 (MP3 URL). Users can choose it in the widget and preview it."
    a2k_meet_custom_ringtone_2: "Custom ringtone 2 (MP3 URL)"
    a2k_meet_custom_ringtone_3: "Custom ringtone 3 (MP3 URL)"
    a2k_meet_custom_ringtone_4: "Custom ringtone 4 (MP3 URL)"
    a2k_meet_custom_ringtone_5: "Custom ringtone 5 (MP3 URL)"
    a2k_meet_custom_ringtone_6: "Custom ringtone 6 (MP3 URL)"
    a2k_meet_custom_ringtone_7: "Custom ringtone 7 (MP3 URL)"
    a2k_meet_custom_ringtone_8: "Custom ringtone 8 (MP3 URL)"
    a2k_meet_custom_ringtone_9: "Custom ringtone 9 (MP3 URL)"
    a2k_meet_custom_ringtone_10: "Custom ringtone 10 (MP3 URL). Up to 48 seconds to play the full ringtone."
    a2k_meet_alternative_ringtone: "Alternative ringtone (all lively). Used when Sound for incoming calls is set to alternative. Original: classic, modern, soft, double, melodic, retro, digital, pulse, star, cascade. New lively: festivo, allegro, vivace, brillante, energico, dinamico, scintilla, campanella, trillo, marimba. Relax (Chiamate Relaz): relax1, relax2, relax3, relax4, relax5."
    a2k_meet_video_allowed_groups: "Groups that can enable video during a call (same format as «Who can use A2K Meet»). Only users in these groups see the Video button once the call is connected."
    a2k_meet_ice_servers: "ICE servers for WebRTC (optional). JSON array, e.g. [{\"urls\":\"stun:stun.l.google.com:19302\"},{\"urls\":\"turn:turn.example.com\",\"username\":\"user\",\"credential\":\"pass\"}]. Leave empty to use default Google STUN only. Add a TURN server if calls fail on mobile or corporate networks."
    a2k_meet_primary_color: "Primary colour for the plugin (floating button, backgrounds, accents). Hex code, e.g. #13c98c. A darker shade is computed automatically for gradients."
    a2k_meet_debug_log: "Enable debug logging in the browser console (F12). When enabled, [a2k-meet] messages appear during calls. Useful for support; turn off in production."
