it:
  a2k_meet:
    calling_you: "%{username} ti sta chiamando"
    calling_you_short: "ti sta chiamando"
    incoming_call_title: "Chiamata in arrivo"
    missed_call_short: "Chiamata persa"
    missed_call_title: "Chiamata persa"
    custom_ringtone_n: "Suoneria %{n}"
  site_settings:
    a2k_meet_enabled: "Abilita A2K Meet (chiamate VoIP tra utenti)"
    a2k_meet_allowed_groups: "Chi può vedere e usare A2K Meet (predefinito: solo Amministratori; puoi aggiungere Staff, Moderatori o gruppi per livello di fiducia)"
    a2k_meet_require_follow: "Richiedi che il destinatario segua il chiamante (se discourse-follow è attivo). Se disattivato, qualsiasi utente abilitato può chiamare qualsiasi altro utente abilitato."
    a2k_meet_incoming_sound: "Suono per le chiamate in arrivo: Discourse (none/default/ding/bell/chat), custom (fino a 10 suonerie MP3 sotto; l'utente ne sceglie una dal widget con anteprima), oppure alternative (suonerie built-in). La suoneria suona fino a 48 secondi."
    a2k_meet_custom_ringtone_1: "Suoneria personalizzata 1 (URL MP3). L'utente può sceglierla dal widget e ascoltare l'anteprima."
    a2k_meet_custom_ringtone_2: "Suoneria personalizzata 2 (URL MP3)"
    a2k_meet_custom_ringtone_3: "Suoneria personalizzata 3 (URL MP3)"
    a2k_meet_custom_ringtone_4: "Suoneria personalizzata 4 (URL MP3)"
    a2k_meet_custom_ringtone_5: "Suoneria personalizzata 5 (URL MP3)"
    a2k_meet_custom_ringtone_6: "Suoneria personalizzata 6 (URL MP3)"
    a2k_meet_custom_ringtone_7: "Suoneria personalizzata 7 (URL MP3)"
    a2k_meet_custom_ringtone_8: "Suoneria personalizzata 8 (URL MP3)"
    a2k_meet_custom_ringtone_9: "Suoneria personalizzata 9 (URL MP3)"
    a2k_meet_custom_ringtone_10: "Suoneria personalizzata 10 (URL MP3). Fino a 48 secondi per riprodurre l'intera suoneria."
    a2k_meet_alternative_ringtone: "Suoneria alternativa (tutte movimentate). Usata quando il suono chiamate in arrivo è impostato su alternative. Originali: classic, modern, soft, double, melodic, retro, digital, pulse, star, cascade. Nuove movimentate: festivo, allegro, vivace, brillante, energico, dinamico, scintilla, campanella, trillo, marimba. Rilassanti (Chiamate Relaz): relax1, relax2, relax3, relax4, relax5."
    a2k_meet_video_allowed_groups: "Gruppi che possono abilitare il video durante una chiamata (stesso formato di «Chi può usare A2K Meet»). Solo gli utenti in questi gruppi vedono il tasto Video una volta che la chiamata è stabilita."
    a2k_meet_ice_servers: "Server ICE per WebRTC (opzionale). Array JSON, es. [{\"urls\":\"stun:stun.l.google.com:19302\"},{\"urls\":\"turn:turn.example.com\",\"username\":\"user\",\"credential\":\"pass\"}]. Lascia vuoto per usare solo STUN Google. Aggiungi un server TURN se le chiamate falliscono su reti mobili o aziendali."
    a2k_meet_primary_color: "Colore principale del plugin (pulsante floating, sfondi, accenti). Codice esadecimale, es. #13c98c. Una tonalità più scura viene calcolata automaticamente per i gradienti."
    a2k_meet_debug_log: "Abilita i log di debug nella console del browser (F12). Se attivo, durante le chiamate compaiono i messaggi [a2k-meet]. Utile per il supporto; disattivare in produzione."
