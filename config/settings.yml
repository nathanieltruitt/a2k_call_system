# Admin > Site settings > Plugins — ordine: più importanti in alto, Log sempre in fondo.
plugins:
  # Master e accesso
  a2k_meet_enabled:
    default: true
    client: true
  # Chi può vedere e usare A2K Meet. Default: amministratori (1), moderatori (2), staff (3).
  a2k_meet_allowed_groups:
    default: "1|2|3"
    type: group_list
    list_type: compact
    client: true
  # Se true (e discourse-follow è attivo), il destinatario deve seguire il chiamante per ricevere chiamate.
  a2k_meet_require_follow:
    default: true
    type: boolean
    client: true
  # Mostra il pulsante floating A2K Meet sul sito (solo per i gruppi consentiti). Se disattivato, il pulsante floating è nascosto per tutti.
  a2k_meet_show_floating_button:
    default: true
    type: boolean
    client: true
  # Mostra il pulsante Call nella chat (composer delle chat 1:1), solo per i gruppi consentiti. Se disattivato, il pulsante non è visibile a nessuno.
  a2k_meet_show_chat_button:
    default: true
    type: boolean
    client: true
  # Video
  # Gruppi che possono abilitare il video durante una chiamata (stesso formato di "Chi può usare A2K Meet"). Solo chi è in questi gruppi vede il tasto Video in chiamata.
  a2k_meet_video_allowed_groups:
    default: "1|2|3"
    type: group_list
    list_type: compact
    client: true
  # Aspetto
  # Colore principale del plugin (pulsante, sfondi, accenti). Default: verde #13c98c.
  a2k_meet_primary_color:
    default: "#13c98c"
    client: true
  # Suonerie — gruppo unito, ordine interno invariato
  # Suono per chiamate in arrivo: Discourse chat (none/default/ding/bell/chat), custom (URL sotto), oppure alternative (5 suonerie sotto).
  a2k_meet_incoming_sound:
    default: "default"
    type: enum
    client: true
    choices:
      - none
      - default
      - ding
      - bell
      - chat
      - custom
      - alternative
  # Fino a 10 suonerie personalizzate (MP3). L'admin inserisce gli URL; l'utente ne sceglie una dal widget (con anteprima).
  a2k_meet_custom_ringtone_1:
    default: ""
    client: true
  a2k_meet_custom_ringtone_2:
    default: ""
    client: true
  a2k_meet_custom_ringtone_3:
    default: ""
    client: true
  a2k_meet_custom_ringtone_4:
    default: ""
    client: true
  a2k_meet_custom_ringtone_5:
    default: ""
    client: true
  a2k_meet_custom_ringtone_6:
    default: ""
    client: true
  a2k_meet_custom_ringtone_7:
    default: ""
    client: true
  a2k_meet_custom_ringtone_8:
    default: ""
    client: true
  a2k_meet_custom_ringtone_9:
    default: ""
    client: true
  a2k_meet_custom_ringtone_10:
    default: ""
    client: true
  # Suoneria alternativa (usata quando "Suono chiamate in arrivo" è "alternative"). Suonerie movimentate + Relaz (rilassanti). Default: ringtone 3 (soft).
  a2k_meet_alternative_ringtone:
    default: "soft"
    type: enum
    client: true
    choices:
      - classic
      - modern
      - soft
      - double
      - melodic
      - retro
      - digital
      - pulse
      - star
      - cascade
      - festivo
      - allegro
      - vivace
      - brillante
      - energico
      - dinamico
      - scintilla
      - campanella
      - trillo
      - marimba
      - relax1
      - relax2
      - relax3
      - relax4
      - relax5
  # Tecnico / rete
  # ICE servers per WebRTC (opzionale). JSON array, es: [{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:turn.example.com","username":"user","credential":"pass"}]. Lascia vuoto per usare solo STUN Google.
  a2k_meet_ice_servers:
    default: ""
    client: true
  # Sempre in fondo: supporto / debug
  # Log di debug in console (F12): se attivo, gli utenti vedranno i messaggi [a2k-meet] durante le chiamate. Utile per supporto; disattivare in produzione.
  a2k_meet_debug_log:
    default: false
    type: boolean
    client: true
